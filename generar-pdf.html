<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Generando PDF — Julio Méndez</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1b2a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #1b2d42;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #fff; }
    p  { font-size: 0.9rem; color: #7eaecf; margin-bottom: 1.5rem; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #243b55;
      border-top-color: #1a6baa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      background: #1a6baa;
      color: #fff;
      font-weight: 700;
      padding: 0.7rem 1.6rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      display: none;
    }
    .btn:hover { opacity: 0.85; }
    #status { font-size: 0.82rem; color: #4ec9b0; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h1>Generando PDF…</h1>
  <p>Construyendo la hoja de vida de<br><strong>Julio César Méndez Montero</strong></p>
  <button class="btn" id="dlBtn" onclick="descargar()">⬇ Descargar PDF</button>
  <div id="status">Preparando documento…</div>
</div>

<script>
/* ─────────────────── COLORES ─────────────────── */
const NAVY    = '#0d1b2a';
const NAVY2   = '#1b2d42';
const ACCENT  = '#1a6baa';
const WHITE   = '#ffffff';
const MUTED   = '#5a6e82';
const BORDER  = '#d1dce6';
const BGLIGHT = '#f5f8fb';
const ACCENTL = '#d6e8f7';
const SIDETEXT= '#a8c4db';
const SIDEHEAD= '#7eaecf';

/* ─────────────────── FUENTES pdfmake usa Roboto por defecto ── */
pdfmake.fonts = {
  Roboto: {
    normal:      'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/fonts/Roboto/Roboto-Regular.ttf',
    bold:        'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/fonts/Roboto/Roboto-Medium.ttf',
    italics:     'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/fonts/Roboto/Roboto-Italic.ttf',
    bolditalics: 'https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/fonts/Roboto/Roboto-MediumItalic.ttf',
  }
};

/* ─────────────────── HELPERS ─────────────────── */
function sLabel(txt) {
  return {
    text: txt.toUpperCase(),
    fontSize: 6, bold: true, characterSpacing: 1.5,
    color: ACCENT, margin: [0, 10, 0, 4],
    decoration: 'underline', decorationColor: '#243b55'
  };
}

function sItem(txt, sub) {
  const items = [{ text: '· ', color: ACCENT, fontSize: 8 }, { text: txt, color: SIDETEXT, fontSize: 7.5 }];
  const obj = { columns: [{ width: 8, text: '·', color: ACCENT, fontSize: 9 }, { width: '*', text: txt, color: SIDETEXT, fontSize: 7.5 }], margin: [0, 1.5, 0, 1.5] };
  return sub ? { ...obj, text: undefined, columns: [{ width: 8, text: '·', color: ACCENT, fontSize: 9 }, { width: '*', stack: [{ text: txt, color: SIDETEXT, fontSize: 7.5 }, { text: sub, color: '#6a8aa8', fontSize: 6.5 }] }] } : obj;
}

function mainLabel(txt) {
  return {
    text: txt.toUpperCase(),
    fontSize: 6.5, bold: true, characterSpacing: 1.8,
    color: WHITE, background: NAVY,
    margin: [0, 10, 0, 6],
    // simulate badge with fillColor via table
  };
}

function labelBadge(txt) {
  return {
    table: {
      body: [[{ text: txt.toUpperCase(), fontSize: 6, bold: true, characterSpacing: 1.5, color: WHITE, fillColor: NAVY, margin: [5, 2, 5, 2] }]],
      widths: ['auto']
    },
    layout: 'noBorders',
    margin: [0, 10, 0, 6]
  };
}

function entryItem(title, date, org, bullets) {
  const stack = [];
  stack.push({
    columns: [
      { text: title, fontSize: 8.5, bold: true, color: '#1e2d3d', width: '*' },
      date ? { text: date, fontSize: 7, color: ACCENT, bold: true, width: 'auto', alignment: 'right' } : {}
    ],
    margin: [0, 0, 0, 1]
  });
  if (org) stack.push({ text: org, fontSize: 7.5, color: MUTED, margin: [0, 0, 0, 2] });
  if (bullets && bullets.length) {
    bullets.forEach(b => {
      stack.push({
        columns: [
          { width: 8, text: '·', color: ACCENT, fontSize: 10, margin: [2, -1, 0, 0] },
          { width: '*', text: b, fontSize: 7.5, color: MUTED, lineHeight: 1.4 }
        ],
        margin: [0, 1, 0, 1]
      });
    });
  }
  return { stack, margin: [0, 0, 0, 8] };
}

function projectCard(name, desc, liveUrl, codeUrl) {
  return {
    table: {
      widths: ['*'],
      body: [[{
        stack: [
          { text: name, fontSize: 8.5, bold: true, color: '#1e2d3d', margin: [0, 0, 0, 2] },
          { text: desc, fontSize: 7.5, color: MUTED, lineHeight: 1.4, margin: [0, 0, 0, 5] },
          {
            columns: [
              liveUrl && liveUrl !== '#' ? {
                table: { body: [[{ text: '▶ Ver sitio en vivo', fontSize: 7, bold: true, color: WHITE, fillColor: ACCENT, margin: [5, 2, 5, 2], link: liveUrl }]], widths: ['auto'] },
                layout: 'noBorders', width: 'auto'
              } : { text: '▶ Ver sitio en vivo', fontSize: 7, bold: true, color: WHITE, background: ACCENT, width: 'auto', margin: [0,0,0,0] },
              { width: 5, text: '' },
              codeUrl && codeUrl !== '#' ? {
                table: { body: [[{ text: '</> Ver código', fontSize: 7, bold: true, color: ACCENT, margin: [5, 2, 5, 2], link: codeUrl }]], widths: ['auto'] },
                layout: {
                  hLineColor: () => ACCENT, vLineColor: () => ACCENT,
                  hLineWidth: () => 0.8, vLineWidth: () => 0.8
                }, width: 'auto'
              } : {
                table: { body: [[{ text: '</> Ver código', fontSize: 7, bold: true, color: ACCENT, margin: [5, 2, 5, 2] }]], widths: ['auto'] },
                layout: {
                  hLineColor: () => ACCENT, vLineColor: () => ACCENT,
                  hLineWidth: () => 0.8, vLineWidth: () => 0.8
                }, width: 'auto'
              }
            ]
          }
        ],
        fillColor: BGLIGHT,
        margin: [7, 7, 7, 7]
      }]]
    },
    layout: {
      hLineColor: () => BORDER, vLineColor: () => BORDER,
      hLineWidth: () => 0.5, vLineWidth: () => 0.5
    },
    margin: [0, 0, 0, 6]
  };
}

/* ─────────────────── DOCUMENTO ─────────────────── */
function buildDoc() {
  return {
    pageSize: 'A4',
    pageMargins: [0, 0, 0, 0],
    defaultStyle: { font: 'Roboto', fontSize: 8, lineHeight: 1.4 },

    background: function() {
      return [
        /* Sidebar navy background */
        { canvas: [{ type: 'rect', x: 0, y: 0, w: 185, h: 842, color: NAVY }] }
      ];
    },

    content: [
      {
        columns: [
          /* ══ SIDEBAR ══ */
          {
            width: 185,
            stack: [
              /* Iniciales */
              {
                alignment: 'center',
                margin: [0, 22, 0, 12],
                stack: [{
                  canvas: [{
                    type: 'ellipse', x: 55, y: 55, r1: 48, r2: 48,
                    lineColor: ACCENT, lineWidth: 2.5, color: NAVY2
                  }]
                }, {
                  text: 'JM',
                  fontSize: 22, bold: true, color: ACCENT,
                  alignment: 'center', margin: [0, -76, 0, 14]
                }]
              },

              /* Contacto */
              { ...sLabel('Contacto'), margin: [14, 0, 0, 4] },
              { columns: [{ width: 12, text: '✉', color: ACCENT, fontSize: 8 }, { width: '*', text: 'mendezmonterojuliocesar09@gmail.com', color: SIDETEXT, fontSize: 6.8, link: 'mailto:mendezmonterojuliocesar09@gmail.com' }], margin: [14, 2, 8, 2] },
              { columns: [{ width: 12, text: '📱', fontSize: 7 }, { width: '*', text: '+57 320 404 5599', color: SIDETEXT, fontSize: 7 }], margin: [14, 2, 8, 2] },
              { columns: [{ width: 12, text: '📍', fontSize: 7 }, { width: '*', text: 'Bogotá, Colombia', color: SIDETEXT, fontSize: 7 }], margin: [14, 2, 8, 2] },
              { columns: [{ width: 12, text: '💻', fontSize: 7 }, { width: '*', text: 'github.com/juliomendez', color: SIDETEXT, fontSize: 7, link: 'https://github.com/' }], margin: [14, 2, 8, 6] },

              /* Habilidades técnicas */
              { ...sLabel('Habilidades Técnicas'), margin: [14, 2, 0, 4] },
              ...[
                'Python — programación y análisis de datos',
                'R — estadística y visualización',
                'HTML & CSS — maquetación web',
                'C++ — fundamentos de programación',
                'Excel avanzado',
                'Visual Basic (asistido con IA)',
                'Prompting con Claude, ChatGPT, Copilot',
                'Automatización con Zapier',
              ].map(s => ({ columns: [{ width: 10, text: '·', color: ACCENT, fontSize: 9 }, { width: '*', text: s, color: SIDETEXT, fontSize: 7 }], margin: [14, 1.5, 8, 1.5] })),

              /* Idiomas */
              { ...sLabel('Idiomas'), margin: [14, 6, 0, 4] },
              {
                columns: [
                  { width: '*', text: 'Español', color: SIDETEXT, fontSize: 7.5 },
                  { width: 'auto', table: { body: [[{ text: 'Nativo', fontSize: 6, bold: true, color: NAVY, fillColor: ACCENT, margin: [4, 1, 4, 1] }]], widths: ['auto'] }, layout: 'noBorders' }
                ], margin: [14, 2, 8, 2]
              },
              {
                columns: [
                  { width: '*', text: 'Inglés', color: SIDETEXT, fontSize: 7.5 },
                  { width: 'auto', table: { body: [[{ text: 'B1 Inter.', fontSize: 6, bold: true, color: NAVY, fillColor: ACCENT, margin: [4, 1, 4, 1] }]], widths: ['auto'] }, layout: 'noBorders' }
                ], margin: [14, 2, 8, 2]
              },

              /* Cualidades */
              { ...sLabel('Cualidades Personales'), margin: [14, 6, 0, 4] },
              ...[
                'Aprendizaje rápido de nuevas tecnologías',
                'Trabajo colaborativo en equipo',
                'Pensamiento analítico y numérico',
                'Interés activo en inteligencia artificial',
                'Orientación a resultados e innovación',
                'Mentalidad global con enfoque local',
              ].map(s => ({ columns: [{ width: 10, text: '—', color: ACCENT, fontSize: 7 }, { width: '*', text: s, color: SIDETEXT, fontSize: 7 }], margin: [14, 1.5, 8, 1.5] })),

              /* Proyectos (sidebar) */
              { ...sLabel('Proyectos'), margin: [14, 6, 0, 4] },
              ...[
                'Análisis de calidad del aire en Boyacá con R',
                'Página web de portafolio (fines prácticos)',
                'Análisis de base de datos con Python',
                'Algoritmos con C++ para cálculo de cupos',
              ].map((s, i) => ({
                columns: [{ width: 10, text: `${i+1}.`, color: ACCENT, fontSize: 7, bold: true }, { width: '*', text: s, color: SIDETEXT, fontSize: 7 }],
                margin: [14, 2, 8, 2]
              })),
            ]
          },

          /* ══ MAIN ══ */
          {
            width: '*',
            margin: [18, 22, 18, 0],
            stack: [

              /* Nombre */
              { text: 'Julio César', fontSize: 24, bold: true, color: NAVY, lineHeight: 1.05 },
              { text: 'Méndez Montero', fontSize: 24, bold: true, color: NAVY, lineHeight: 1.05, margin: [0, 0, 0, 4] },
              { text: 'INGENIERÍA DE SISTEMAS Y COMPUTACIÓN', fontSize: 7, bold: true, color: ACCENT, characterSpacing: 1.2, margin: [0, 0, 0, 12] },

              /* Perfil */
              labelBadge('Perfil Profesional'),
              {
                text: 'Estudiante de tercer semestre de Ingeniería de Sistemas con base sólida en Python, R, Excel avanzado y herramientas de automatización. Manejo programación integrada con inteligencia artificial y plataformas como Zapier para optimizar flujos de trabajo. Combino pensamiento lógico con curiosidad tecnológica y capacidad de adaptarme a entornos cambiantes. Busco iniciar mi trayectoria profesional aportando rigor analítico e interés genuino en la transformación digital.',
                fontSize: 7.5, color: MUTED, lineHeight: 1.65,
                margin: [4, 0, 0, 0],
                // left accent line via canvas
              },
              { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 0, y2: 0 }] }, // spacer

              /* Proyectos */
              labelBadge('Visualización de Proyectos'),
              projectCard(
                'Simulador de Cupo Bancario — C++',
                'Algoritmo condicional (if/else) que calcula el cupo final de un cliente. Implementado en C++ y demostrado interactivamente en la web.',
                'proyecto1-cpp.html', '#'
              ),
              projectCard(
                'Análisis de Datos Netflix — Python',
                'Limpieza y análisis de 8.807 títulos con Pandas. Visualización dinámica: distribución, duración, temporadas y tendencias.',
                'proyecto2-python.html', '#'
              ),
              projectCard(
                'Portafolio Web — HTML & CSS',
                'Página de portafolio profesional con navegación, artículo sobre ML, tabla de tarifas y mapa. Información creada con fines prácticos.',
                'mendez-julio-lab-html/index.html', '#'
              ),
              projectCard(
                'Plan de Gestión de Dinero — Excel + VBA',
                'Modelo financiero para seguimiento de préstamo de $17.964.013 COP. Registro de inversiones, amortización mensual y resumen anual automatizados con macros VBA.',
                'proyecto4-excel.html', '#'
              ),

              /* Formación */
              labelBadge('Formación Académica'),
              entryItem('Ingeniería de Sistemas y Computación', '2025 — Actualidad', 'Universidad Central — Bogotá, Colombia', []),
              entryItem('Bachiller Académico', '2024', 'Institución Educativa FITS', ['Trabajo investigativo en grado 11 enfocado en una biografía como proyecto de grado.']),
              entryItem('Curso de Inglés', '2025', 'American School Way', ['Referencia: Ilia Gorin (Profesor) — +57 302 5959780']),
            ]
          }
        ],
        columnGap: 0
      }
    ],

    footer: function(page, pages) {
      return {
        table: {
          widths: ['*'],
          body: [[{
            text: '"Combinar excelencia en ingeniería con la innovación de la IA" — ese es el tipo de reto que busco.',
            fontSize: 6.5, italics: true, color: '#4a6a82',
            fillColor: NAVY, alignment: 'right',
            margin: [20, 7, 20, 7]
          }]]
        },
        layout: 'noBorders',
        margin: [0, 0, 0, 0]
      };
    }
  };
}

/* ─────────────────── GENERACIÓN ─────────────────── */
let pdfDoc = null;

window.addEventListener('load', () => {
  document.getElementById('status').textContent = 'Construyendo layout…';
  setTimeout(() => {
    try {
      pdfDoc = pdfmake.createPdf(buildDoc());
      document.getElementById('status').textContent = '✓ PDF listo — descargando…';
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('dlBtn').style.display = 'inline-block';
      pdfDoc.download('Julio_Mendez_Montero_HV.pdf');
    } catch (e) {
      document.getElementById('status').textContent = 'Error: ' + e.message;
      console.error(e);
    }
  }, 600);
});

function descargar() {
  if (pdfDoc) pdfDoc.download('Julio_Mendez_Montero_HV.pdf');
}
</script>
</body>
</html>
